app = "semeai-gate-api"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  SEMEAI_GATE_HOST = "0.0.0.0"
  SEMEAI_GATE_PORT = "8787"
  SEMEAI_GATE_RECEIPT_DIR = "/app/outputs/api_receipts"
  SEMEAI_GATE_ACCOUNT_DIR = "/app/outputs/api_accounts"
  SEMEAI_GATE_PUBLIC_SITE_URL = "https://semeai.tech"
  SEMEAI_GATE_CORS_ORIGINS = "https://semeai.tech,https://www.semeai.tech,https://gate.semeai.tech"
  SEMEAI_GATE_USDT_TRC20_ADDRESS = "TJmrrUrpsRpG3u9H4FE9oVyCRPYQYEpG27"
  SEMEAI_GATE_MANUAL_USDT_AMOUNT = "25.00"
  SEMEAI_GATE_OPERATOR_EMAIL = "adelayida0403@gmail.com"
  SEMEAI_GATE_FEEDBACK_EMAIL = "adelayida0403@gmail.com"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  source = "semeai_gate_api_data"
  destination = "/app/outputs"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
