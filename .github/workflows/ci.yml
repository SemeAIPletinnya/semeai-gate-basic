name: ci

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip pytest

      - name: Python compile
        run: |
          python -m py_compile semeai_gate_basic\gate.py semeai_gate_basic\__main__.py tools\run_benchmark.py tests\test_gate_basic.py

      - name: Python tests
        run: |
          python -m pytest

      - name: Benchmark
        run: |
          python tools\run_benchmark.py

      - name: Contract check
        run: |
          python tools\check_contract.py

      - name: Node example
        run: |
          node examples\fake_promo_code.js
          node examples\existing_chatbot_integration.js
