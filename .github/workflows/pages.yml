name: pages

on:
  push:
    branches: ["master", "main"]
    paths:
      - "index.html"
      - ".nojekyll"
      - "demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Build static Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site/demo
          cp index.html .nojekyll _site/
          cp demo/index.html demo/saas_visible.html _site/demo/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
