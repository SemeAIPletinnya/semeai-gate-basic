<svg width="1180" height="520" viewBox="0 0 1180 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SemeAI Gate Basic fake promo code flow</title>
  <desc id="desc">An AI answer invents promo code SAVE30, business data has no active promo codes, SemeAI Gate returns BLOCK/SILENCE, and a safe fallback plus audit receipt are preserved.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071013"/>
      <stop offset="1" stop-color="#0F151D"/>
    </linearGradient>
    <linearGradient id="gate" x1="632" y1="146" x2="876" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A5D45"/>
      <stop offset="1" stop-color="#123D49"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <style>
      .title{font:700 34px Inter,Segoe UI,Arial,sans-serif;fill:#F5F7FA}
      .subtitle{font:500 18px Inter,Segoe UI,Arial,sans-serif;fill:#9AA8B6}
      .card-title{font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#F5F7FA}
      .card-label{font:600 13px Inter,Segoe UI,Arial,sans-serif;fill:#8CA3B8;text-transform:uppercase;letter-spacing:.08em}
      .body{font:500 16px Inter,Segoe UI,Arial,sans-serif;fill:#D6DEE7}
      .muted{font:500 14px Inter,Segoe UI,Arial,sans-serif;fill:#8EA0B2}
      .code{font:700 18px Consolas,Menlo,monospace;fill:#F8D66D}
      .pill{font:800 16px Inter,Segoe UI,Arial,sans-serif;fill:#FFD6D6}
      .small-pill{font:700 12px Inter,Segoe UI,Arial,sans-serif;fill:#7EF0C1}
      .line{stroke:#2C3A45;stroke-width:2}
      .arrow{stroke:#44E3B0;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1180" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="1010" cy="74" r="170" fill="#124E44" opacity=".16"/>
  <circle cx="210" cy="446" r="190" fill="#0B6B7A" opacity=".12"/>

  <g transform="translate(48 42)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">SemeAI Gate Basic</text>
    <text class="subtitle" x="0" y="48" dominant-baseline="hanging">Stops unsupported AI answers before they reach users.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="48" y="126" width="250" height="178" rx="18" fill="#121A22" stroke="#263441"/>
    <text class="card-label" x="72" y="154">User Message</text>
    <text class="body" x="72" y="196">Give me a 30% discount</text>
    <text class="body" x="72" y="224">promo code for my account.</text>
    <rect x="72" y="252" width="92" height="30" rx="15" fill="#132B34" stroke="#244958"/>
    <text class="muted" x="90" y="272">input</text>

    <rect x="342" y="126" width="250" height="178" rx="18" fill="#171B24" stroke="#334050"/>
    <text class="card-label" x="366" y="154">AI Answer</text>
    <text class="body" x="366" y="196">Use promo code</text>
    <text class="code" x="366" y="226">SAVE30</text>
    <text class="body" x="452" y="226">for 30% off.</text>
    <rect x="366" y="252" width="128" height="30" rx="15" fill="#352817" stroke="#7C5E22"/>
    <text class="muted" x="383" y="272">candidate</text>

    <rect x="636" y="126" width="250" height="178" rx="18" fill="#121A22" stroke="#263441"/>
    <text class="card-label" x="660" y="154">Business Data</text>
    <text class="body" x="660" y="196">active_promo_codes:</text>
    <text class="code" x="660" y="226">[]</text>
    <rect x="660" y="252" width="142" height="30" rx="15" fill="#132B34" stroke="#244958"/>
    <text class="muted" x="678" y="272">source of truth</text>

    <rect x="930" y="126" width="202" height="178" rx="18" fill="url(#gate)" stroke="#4CE6B3"/>
    <text class="card-label" x="954" y="154" fill="#A8F6D5">SemeAI Gate</text>
    <rect x="954" y="190" width="96" height="36" rx="18" fill="#4B161B" stroke="#FF6A75"/>
    <text class="pill" x="977" y="214">BLOCK</text>
    <text class="muted" x="954" y="252" fill="#C8FBE6">internal: SILENCE</text>
    <text class="muted" x="954" y="276" fill="#C8FBE6">audit preserved</text>
  </g>

  <path class="arrow" d="M306 215H332"/>
  <path class="arrow" d="M326 207L334 215L326 223"/>
  <path class="arrow" d="M600 215H626"/>
  <path class="arrow" d="M620 207L628 215L620 223"/>
  <path class="arrow" d="M894 215H920"/>
  <path class="arrow" d="M914 207L922 215L914 223"/>

  <g filter="url(#softShadow)">
    <rect x="170" y="352" width="392" height="96" rx="18" fill="#121A22" stroke="#263441"/>
    <text class="card-title" x="194" y="382">Host product response</text>
    <text class="body" x="194" y="416">Do not show the fake promo code.</text>
    <text class="muted" x="194" y="438">Show safe fallback or route to support.</text>

    <rect x="618" y="352" width="392" height="96" rx="18" fill="#121A22" stroke="#263441"/>
    <text class="card-title" x="642" y="382">Receipt</text>
    <text class="body" x="642" y="416">Decision metadata is kept locally.</text>
    <text class="muted" x="642" y="438">Raw prompt/answer text is not stored by default.</text>
  </g>

  <path class="line" d="M1031 304V330C1031 342 1021 352 1009 352H814"/>
  <path class="line" d="M1031 304V330C1031 342 1021 352 1009 352H366C354 352 344 342 344 330V304"/>

  <g transform="translate(48 484)">
    <rect x="0" y="-25" width="246" height="34" rx="17" fill="#0B2D28" stroke="#1E755F"/>
    <text class="small-pill" x="18" y="-3">SHOW / REVIEW / BLOCK</text>
    <text class="muted" x="270" y="-4">Business-facing actions mapped to PROCEED / NEEDS_REVIEW / SILENCE.</text>
  </g>
</svg>
